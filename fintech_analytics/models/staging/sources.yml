version: 2

sources:
  - name: raw
    description: >
      Raw CSV files generated by scripts/generate_data.py and stored in data/raw/.
      These are the untouched source records — no transformations applied.
    tables:
      - name: transactions
        description: >
          50,000 raw payment transactions spanning Jan 2023 – Dec 2024.
          Includes completed, pending, and failed statuses. Fraud flag is
          synthetically generated based on amount thresholds.
        columns:
          - name: transaction_id
            description: Unique identifier for each transaction (e.g. TXN_0000001)
          - name: customer_id
            description: Foreign key to the customers table
          - name: date
            description: Transaction date (YYYY-MM-DD string in raw CSV)
          - name: time
            description: Transaction time (HH:MM:SS string in raw CSV)
          - name: amount
            description: Transaction amount in GBP
          - name: merchant_category
            description: Spending category (e.g. groceries, travel, entertainment)
          - name: merchant_name
            description: Name of the merchant
          - name: city
            description: City where the transaction occurred
          - name: is_fraud
            description: Boolean flag — true if this transaction is fraudulent
          - name: status
            description: Transaction status — completed, pending, or failed

      - name: customers
        description: >
          10,000 synthetic UK customer profiles with account type, credit score,
          and annual income. Generated alongside transactions.
        columns:
          - name: customer_id
            description: Unique customer identifier (e.g. CUST_00001)
          - name: first_name
            description: Customer first name
          - name: last_name
            description: Customer last name
          - name: email
            description: Customer email address
          - name: city
            description: Customer home city
          - name: account_type
            description: Account tier — current (60%), savings (30%), or premium (10%)
          - name: signup_date
            description: Date the customer opened their account
          - name: credit_score
            description: Credit score between 300 and 850
          - name: annual_income
            description: Estimated annual income in GBP
          - name: is_active
            description: Whether the customer account is currently active
